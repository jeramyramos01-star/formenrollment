<!DOCTYPE html>
<html>
<head>
  <title>Clark College Enrollment Form</title>
</head>
<body>

  <h1>Clark College Enrollment Form</h1>

  <form action="#" method="post">

    <fieldset>
      <legend>Personal Information</legend>

      <label for="firstName">First Name:</label>
      <input type="text" id="firstName" name="firstName" required><br><br>

      <label for="middleName">Middle Name:</label>
      <input type="text" id="middleName" name="middleName" required><br><br>

      <label for="lastName">Last Name:</label>
      <input type="text" id="lastName" name="lastName" required><br><br>

      <label for="birthDate">Birth Date:</label>
      <input type="date" id="birthDate" name="birthDate" required><br><br>


      <label>Sex:</label><br>
      <input type="radio" name="gender" value="Male" required> Male
      <input type="radio" name="gender" value="Female"> Female
      <br><br>

      <label for="age">Age:</label>
      <input type="number" id="age" name="age" min="0" max="120"><br><br>

    </fieldset>

    <fieldset>
      <legend>Enrollment Details</legend>

      <label for="yearLevel">Year Level:</label>
      <select id="yearLevel" name="yearLevel" required>
        <option value="">Select Year Level</option>
        <option value="1st Year">1st Year</option>
        <option value="2nd Year">2nd Year</option>
        <option value="3rd Year">3rd Year</option>
        <option value="4th Year">4th Year</option>
      </select>
      <br><br>

      <label for="course">Course:</label>
      <select id="course" name="course" required>
        <option value="">Select Course</option>
        <option value="ACT">ACT</option>
        <option value="BSOA">BSOA</option>
        <option value="HM">HM</option>
      </select>
      <br><br>

      <label for="citizenship">Citizenship:</label>
      <input type="text" id="citizenship" name="citizenship"><br><br>

      <label for="civilStatus">Civil Status:</label>
      <input type="text" id="civilStatus" name="civilStatus"><br><br>

    </fieldset>

    <fieldset>
      <legend>Address</legend>

      <label for="region">Region:</label>
      <input type="text" id="region" name="region"><br><br>

      <label for="province">Province:</label>
      <input type="text" id="province" name="province"><br><br>

      <label for="city">City:</label>
      <input type="text" id="city" name="city"><br><br>

      <label for="barangay">Barangay:</label>
      <input type="text" id="barangay" name="barangay"><br><br>

      <label for="houseNo">House No/Street:</label>
      <input type="text" id="houseNo" name="houseNo"><br><br>

    </fieldset>

    <fieldset>
      <legend>Contact & Credentials</legend>

      <label for="contactNo">Contact Number:</label>
      <input type="tel" id="contactNo" name="contactNo" pattern="[0-9]{7,15}" maxlength="15"><br><br>

      <label for="credentials">Credentials Submitted:</label>
      <select id="credentials" name="credentials" required>
        <option value="">Select Credentials</option>
        <option value="form138">Form 138 (High School)</option>
        <option value="form137">Form 137</option>
        <option value="birthCertificate">Birth Certificate</option>
        <option value="goodMoral">Good Moral Character</option>
        <option value="transcript">Transcript of Records</option>
        <option value="certificate">Certificate of Credentials</option>
        <option value="summerPermit">Summer Permit</option>
        <option value="picture">Picture</option>
      </select>
      <br><br>

    </fieldset>

   <a href="register.html"><button>Submit</button></a>
    <button type="reset">Clear</button>

  </form>

</body>
</html>
